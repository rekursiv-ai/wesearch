name: Package validation

on:
  pull_request:
    branches: [main]
    paths:
      - "**"
  push:
    branches: [main]
    paths:
      - "**"

permissions:
  contents: read

concurrency:
  group: package-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, type-check, test, and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Install ripgrep and fd-find
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ripgrep fd-find
      - name: Validate package
        run: |
          uv sync --frozen --all-groups
          uv run ruff check --no-fix --no-cache .
          uv run ruff format --check --no-cache .
          uv run codespell .
          uv run ty check
          uv run basedpyright --threads=6 wesearch
          uv run pytest
          uv run python -c "import wesearch"
          uv build
