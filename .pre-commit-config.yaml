# See:
#   https://pre-commit.com
#   https://pre-commit.com/hooks.html
#   https://learn.scientific-python.org/development/guides/style/
# uv run pre-commit install
# uv run pre-commit autoupdate
# uv run pre-commit run --all-files
#
# May need: git config --unset-all core.hooksPath
# if: [ERROR] Cowardly refusing to install hooks with `core.hooksPath` set.

# Tool settings: single source of truth.
# Preferred location for any tool setting, in order:
#   pyproject.toml  >  .pre-commit-config.yaml  >  .github/workflows/tests.yml
# Put a setting as high in this chain as the tool allows. Only drop to a lower
# file when the higher one cannot express it (e.g. a CLI-only flag with no
# config key). pyproject.toml holds tool config; .pre-commit-config.yaml is the
# sole source for how hooks run (thread/worker counts, heap caps);
# .github/workflows/tests.yml only invokes the hooks and must not redefine any
# of these.
#
# Philosophy: Only fail if there's things which cannot be auto-fixed.
# Hooks fix files in place; if anything changes, pre-commit reports
# "files were modified" and the commit is aborted. Run `git add -u`
# then re-commit -- the second attempt always passes.
fail_fast: false
default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:

      - id: end-of-file-fixer
        stages: [pre-commit]
        exclude: |
          (?x)^(
            (.*/)?third_party/
          )

      - id: trailing-whitespace
        stages: [pre-commit]
        exclude: |
          (?x)^(
            (.*/)?third_party/
          )

      - id: check-added-large-files
        stages: [pre-commit]
        args: [--maxkb=500, --enforce-all]
        exclude: |
          (?x)^(
            |typings/
            |uv\.lock
          )

      - id: check-merge-conflict
        stages: [pre-commit]
        args: [--assume-in-merge]

      - id: check-yaml
        stages: [pre-commit]

      - id: check-toml
        stages: [pre-commit]

  # Validates uv.lock matches pyproject.toml (no network needed).
  # Run `uv lock` manually when changing dependencies.
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.32
    hooks:
      - id: uv-lock
        stages: [pre-commit]
        files: ^(pyproject\.toml|uv\.lock)$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      # Exclusions defined in pyproject.toml.
      - id: ruff-check
        stages: [pre-commit]
        types_or: [python, pyi, jupyter]
        args: [--fix]
      - id: ruff-format
        stages: [pre-commit]
        types_or: [python, pyi, jupyter]

  - repo: local
    hooks:

      - id: codespell
        name: codespell
        language: system
        stages: [pre-commit]
        types_or: [python, markdown, jupyter, shell]
        entry: uv --quiet run --frozen --group lint codespell
        args: [-w]
        exclude: |
          (?x)^(
            typings/
            |(.*/)?third_party/
          )

  # No official ty pre-commit hook yet (https://github.com/astral-sh/ty/issues/269).
  - repo: local
    hooks:
      - id: ty
        name: ty check
        language: system
        stages: [pre-commit]
        # Annoyingly there's no good choice.
        #   pass_filenames: true
        #     Pro: Only what you touch is checked.
        #     Con: pyproject.toml ``[tool.ty.src].exclude`` are ignored.
        #   pass_filenames: false
        #     Pro: pyproject.toml ``[tool.ty.src].exclude`` is honored.
        #     Con: repo-wide
        # Compromise: duplication; the exclusion list below must mirror
        # pyproject.toml's ``[tool.ty.src]``.
        types_or: [python, pyi]
        entry: uv --quiet run --frozen --group typecheck ty check
        # Exclusions defined in pyproject.toml.

  # To enable:  uv run pre-commit install --hook-type pre-push
  # To disable: uv run pre-commit uninstall --hook-type pre-push
  - repo: local
    hooks:
      - id: ty-global
        name: ty check global
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]
        entry: uv --quiet run --frozen --group typecheck ty check
        # Exclusions defined in pyproject.toml.

  - repo: local
    hooks:
      - id: basedpyright-global
        name: basedpyright-global
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]
        entry: >-
          bash -c '
            workers=$(nproc);
            workers=$((workers / 2));
            ((workers < 2)) && workers=2;
            ((workers > 32)) && workers=32;
            exec env NODE_OPTIONS=--max-old-space-size=2048 \
            uv --quiet run --frozen --group typecheck \
            basedpyright --threads="$workers"
          '

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]
        entry: &pytest-entry >-
          bash -c '
            if [ -n "$CI" ]; then
              workers=1;
            else
              workers=$(nproc);
              workers=$((workers / 2));
              ((workers < 2)) && workers=2;
              ((workers > 32)) && workers=32;
            fi;
            exec uv --quiet run --frozen --group test \
            pytest -n="$workers" "$@"
          ' pytest
        args: [-q, --tb=short]

      - id: pytest-integration
        name: pytest (integration)
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]
        # Tolerate pytest exit 5 (no tests collected): this package may ship no
        # integration-marked tests, which is not a failure. Regular pytest above
        # stays strict so an empty collection there still fails.
        entry: >-
          bash -c '
            if [ -n "$CI" ]; then
              workers=1;
            else
              workers=$(nproc);
              workers=$((workers / 2));
              ((workers < 2)) && workers=2;
              ((workers > 32)) && workers=32;
            fi;
            uv --quiet run --frozen --group test \
            pytest -n="$workers" "$@" || test "$?" = 5
          ' pytest
        args: [-q, --tb=short, -m, integration]
